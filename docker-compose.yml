services:
  mongodb:
    image: mongo:7.0
    container_name: bookreviews-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: bookreviews


  user-service:
    build: ./user-service
    container_name: bookreviews-user-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/bookreviews-users
    depends_on:
      - mongodb

  book-service:
    build: ./book-service
    container_name: bookreviews-book-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/bookreviews-books
    depends_on:
      - mongodb

  review-service:
    build: ./review-service
    container_name: bookreviews-review-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/bookreviews-reviews
    depends_on:
      - mongodb

volumes:
  mongodb_data: