server:
  port: 8080

spring:
  application:
    name: api-gateway

  # Redis para rate limiting
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
      lettuce:
        pool:
          max-active: 10
          max-idle: 5

  cloud:
    gateway:
      metrics:
        enabled: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

      # Timeout global por defecto
      httpclient:
        connect-timeout: 3000   # ms
        response-timeout: 10s

      # Filtros globales aplicados a TODAS las rutas
      #default-filters:
      #  - name: RequestRateLimiter
      #    args:
      #      redis-rate-limiter.replenishRate: 20      # tokens/segundo
      #      redis-rate-limiter.burstCapacity: 40      # pico máximo
      #      redis-rate-limiter.requestedTokens: 1
      #      key-resolver: "#{@userOrIpKeyResolver}"

      routes:
        # ── Servicio de usuarios ──────────────────────────────────────────
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**, /auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: user-service-cb
                fallbackUri: forward:/fallback/user-service
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
                methods: GET
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - RemoveRequestHeader=Cookie

        # ── Servicio de books ─────────────────────────────────────────
        - id: book-service
          uri: ${BOOK_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/books/**
          filters:
            - name: CircuitBreaker
              args:
                name: book-service-cb
                fallbackUri: forward:/fallback/book-service
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
                methods: GET
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - RemoveRequestHeader=Cookie

        # ── Servicio de reviews ───────────────────────────────────────────
        - id: review-service
          uri: ${REVIEW_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/reviews/**
          filters:
            - name: CircuitBreaker
              args:
                name: review-service-cb
                fallbackUri: forward:/fallback/review-service
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - RemoveRequestHeader=Cookie

# JWT
jwt:
  secret: ${JWT_SECRET:my-very-long-secret-key-for-development-only-32chars}
  expiration-ms: 86400000   # 24h

# Resilience4j Circuit Breaker
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50          # %
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.server.ResponseStatusException
    instances:
      user-service-cb:
        base-config: default
      product-service-cb:
        base-config: default
      order-service-cb:
        base-config: default
        failure-rate-threshold: 40          # órdenes: más estricto
  timelimiter:
    configs:
      default:
        timeout-duration: 5s
    instances:
      user-service-cb:
        timeout-duration: 5s
      product-service-cb:
        timeout-duration: 5s
      order-service-cb:
        timeout-duration: 8s               # órdenes pueden tardar más

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# Logging
logging:
  level:
    root: INFO
    com.bookreview.gateway: DEBUG
    org.springframework.cloud.gateway: TRACE
    io.github.resilience4j: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] [%X{userId}] %-5level %logger{36} - %msg%n"
